version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: horizontal_ph_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: horizontal_ph
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: horizontal_ph_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: horizontal_ph_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@horizontal.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pg_data:
  redis_data: